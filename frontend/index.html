<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>frontend</title>
</head>

<body>
  <div id="error-overlay"
    style="display: none; position: fixed; top: 0; left: 0; right: 0; background: red; color: white; padding: 20px; z-index: 9999; font-family: monospace; height: 100vh; overflow: auto; white-space: pre-wrap;">
  </div>
  <script>
    window.onerror = function (msg, url, line, col, error) {
      document.getElementById('error-overlay').style.display = 'block';
      document.getElementById('error-overlay').innerHTML += 'ERROR: ' + msg + '<br/>\n' + (error && error.stack ? error.stack : '') + '<br/><br/>';
    };
    window.addEventListener('unhandledrejection', function (event) {
      document.getElementById('error-overlay').style.display = 'block';
      document.getElementById('error-overlay').innerHTML += 'PROMISE ERROR: ' + event.reason + '<br/><br/>';
    });
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
