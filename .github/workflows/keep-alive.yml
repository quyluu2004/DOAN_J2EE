name: Keep Render Backend Alive

on:
  schedule:
    # Chạy mỗi 14 phút để tránh Render sleep (Render tự động sleep sau 15 phút không có request)
    - cron: '*/14 * * * *'
  # Cho phép chạy thủ công từ giao diện GitHub Actions
  workflow_dispatch:
  # Tự động ping khi có code mới được push lên main hoặc master
  push:
    branches:
      - main
      - master

# ======================================================================================
# ⚠️ LƯU Ý QUAN TRỌNG VỀ GITHUB ACTIONS:
# GitHub sẽ tự động dừng (disable) scheduled workflows (cron) nếu repository không có hoạt động
# commit mới trong vòng 60 ngày.
#
# 👉 GIẢI PHÁP THAY THẾ TỐT NHẤT TRÊN PRODUCTION:
# Đăng ký tài khoản miễn phí trên https://cron-job.org hoặc https://uptimerobot.com và cấu hình
# gửi request GET đến URL: https://elitan.onrender.com/api/health định kỳ 10 phút một lần.
# Các dịch vụ này chạy độc lập và không bao giờ tự động dừng, giúp backend của bạn luôn thức.
# ======================================================================================

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render backend
        run: |
          # TODO: Thay đổi URL bên dưới thành URL backend thật của bạn sau khi deploy lên Render
          # Ví dụ: https://elitan-backend.onrender.com/api/health
          BACKEND_URL="https://elitan.onrender.com/api/health"
          
          echo "Pinging $BACKEND_URL..."
          HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}\n" $BACKEND_URL)
          
          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "✅ Ping thành công! Backend vẫn đang thức (Status: $HTTP_STATUS)"
          else
            echo "⚠️ Ping có thể thất bại hoặc backend đang khởi động lại (Status: $HTTP_STATUS)"
          fi
