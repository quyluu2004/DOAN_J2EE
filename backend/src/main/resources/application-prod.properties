# ============================================================
# ÉLITAN Production Properties
# Dùng cho deployment trên Render — TẤT CẢ giá trị lấy từ env vars
# Activate: set SPRING_PROFILES_ACTIVE=prod
# ============================================================

spring.application.name=elitan-backend

# --- DATABASE ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# --- JPA ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- JWT ---
jwt.secret=${JWT_SECRET}
jwt.expiration=1800000

# --- SOCIAL LOGIN ---
google.client-id=${GOOGLE_CLIENT_ID}
facebook.app-id=${FACEBOOK_APP_ID}

# --- MAIL ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# --- FRONTEND URL (cùng domain vì monolith) ---
app.frontend-url=${FRONTEND_URL:https://elitan.onrender.com}

# --- CORS (cùng domain nên chỉ cần self) ---
app.cors.allowed-origins=${CORS_ORIGINS:https://elitan.onrender.com}

# --- FILE UPLOAD ---
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

# --- ERROR ---
server.error.include-message=never
server.error.include-binding-errors=never

# --- DISCORD ---
discord.bot.token=${DISCORD_BOT_TOKEN}

# --- REDIS (tắt mặc định) ---
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# --- PORT (Render sẽ set PORT env var) ---
server.port=${PORT:8080}
